# ------------------------------
#  Task and Dataset Settings
# ------------------------------
task: mlc 
dataset: litcovid  # Dataset identifier/name for organizing and querying experiments

data_files:
  test_file: "data/datasets/samples/litcovid_test_samples.json"
  train_file:

# ------------------------------
#  Prompt Generation Settings
# ------------------------------
prompt:
  system_prompt: "config/prompts/mlc/litcovid.txt"
  shot_indices:  # Omit for zero-shot, or "0,1,2" for 3-shot
  output_file: null  # Will be auto-named as litcovid_[hash].json. All pipeline stages update this single file by default.

# ------------------------------
#  Model Inference Settings
# ------------------------------
model:
  provider: hf
  name: "meta-llama/Llama-3.2-3B-Instruct"

inference:
  temperature: 0.01
  max_new_tokens: 50
  output_file: null  # Will be auto-named as litcovid_[hash].json. All pipeline stages update this single file by default.

# ------------------------------
#  Evaluation Settings
# ------------------------------
evaluation:
  postprocessing: process_mlc_custom         # Parse multi-label text output into binary vector representation
  labels: mechanism, transmission, diagnosis, treatment, prevention, case report, epidemic forecasting
  output_file: null  # Will be auto-named as litcovid_[hash].json. All pipeline stages update this single file by default.
  metrics:
    - macro_f1
    - weighted_f1
