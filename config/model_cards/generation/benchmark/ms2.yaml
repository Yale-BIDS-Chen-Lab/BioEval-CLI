# ------------------------------
#  Task and Dataset Settings
# ------------------------------
task: generation 
dataset: ms2  # Dataset identifier/name for organizing and querying experiments

data_files:
  test_file: "data/datasets/samples/ms2_valid_samples.json"
  train_file:

# ------------------------------
#  Prompt Generation Settings
# ------------------------------
prompt:
  system_prompt: "config/prompts/generation/ms2.txt"
  shot_indices:  # Omit for zero-shot, or "0,1,2" for 3-shot
  output_file: null  # Will be auto-named as ms2_[hash].json. All pipeline stages update this single file by default.

# ------------------------------
#  Model Inference Settings
# ------------------------------
model:
  provider: hf
  name: "meta-llama/Llama-3.2-1B-Instruct"

inference:
  temperature: 0.5
  max_new_tokens: 200
  output_file: null  # Will be auto-named as ms2_[hash].json. All pipeline stages update this single file by default.

# ------------------------------
#  Evaluation Settings
# ------------------------------
evaluation:
  postprocessing: load_raw_data              # Raw passthrough (no normalization) so cased metrics match the web app
  labels: null                               # No labels needed for generation tasks
  output_file: null  # Will be auto-named as ms2_[hash].json. All pipeline stages update this single file by default.
  metrics:
    - rouge1
    - bertscore
