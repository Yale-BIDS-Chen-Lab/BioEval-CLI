# ------------------------------
#  Task and Dataset Settings
# ------------------------------
task: ner 
dataset: ncbi_disease_token_indices  # Dataset identifier/name for organizing and querying experiments

data_files:
  test_file: "data/datasets/samples/ncbi_disease_token_indices_test_samples.json"
  train_file:

# ------------------------------
#  Prompt Generation Settings
# ------------------------------
prompt:
  system_prompt: "config/prompts/ner/ncbi_disease.txt"
  shot_indices:  # Omit for zero-shot, or "0,1,2" for 3-shot
  output_file: null  # Will be auto-named as ncbi_disease_[hash].json. All pipeline stages update this single file by default.

# ------------------------------
#  Model Inference Settings
# ------------------------------
model:
  provider: hf
  name: "meta-llama/Llama-3.2-3B-Instruct"

inference:
  temperature: 0.01
  max_new_tokens: 200  
  output_file: null  # Will be auto-named as ncbi_disease_[hash].json. All pipeline stages update this single file by default.

# ------------------------------
#  Evaluation Settings
# ------------------------------
evaluation:
  postprocessing: process_ner_token_indices  # Extract entities from HTML-annotated text with span tags (TOKEN INDICES)
  labels: disease                            # Entity type to extract
  output_file: null  # Will be auto-named as ncbi_disease_[hash].json. All pipeline stages update this single file by default.
  metrics:
    - exact_match_precision
    - exact_match_recall
    - exact_match_f1

