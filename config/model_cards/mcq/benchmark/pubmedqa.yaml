# ------------------------------
#  Task and Dataset Settings
# ------------------------------
task: mcq 
dataset: pubmedqa  # Benchmark dataset - postprocessing explicitly configured

data_files:
  test_file: "data/datasets/samples/pubmedqa_test_samples.json"
  train_file:

# ------------------------------
#  Prompt Generation Settings
# ------------------------------
prompt:
  system_prompt: "config/prompts/mcq/pubmedqa.txt"
  shot_indices:  # Omit for zero-shot, or "0,1,2" for 3-shot
  output_file: null  # Will be auto-named as pubmedqa_[hash].json. All pipeline stages update this single file by default.

# ------------------------------
#  Model Inference Settings
# ------------------------------
model:
  provider: hf
  name: "meta-llama/Llama-3.2-3B-Instruct"

inference:
  temperature: 0.01
  max_new_tokens: 10  # Short answer needed (just yes, no, or maybe)
  output_file: null  # Will be auto-named as pubmedqa_[hash].json. All pipeline stages update this single file by default.

# ------------------------------
#  Evaluation Settings
# ------------------------------
evaluation:
  postprocessing: process_mcq_custom         # Parse and extract multiple-choice answer from model output.
  labels: Yes/No/Maybe                       # Option type: Yes, No, Maybe
  output_file: null  # Will be auto-named as pubmedqa_[hash].json. All pipeline stages update this single file by default.
  metrics:
    - accuracy
    - macro_f1
    - weighted_f1
