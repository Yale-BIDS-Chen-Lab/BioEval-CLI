# ------------------------------
#  Task and Dataset Settings
# ------------------------------
task: mcq 
dataset: medqa  # Benchmark dataset - postprocessing explicitly configured

data_files:
  test_file: "data/datasets/samples/medqa_test_samples.json"
  train_file:

# ------------------------------
#  Prompt Generation Settings
# ------------------------------
prompt:
  system_prompt: "config/prompts/mcq/medqa.txt"
  shot_indices:  # Omit for zero-shot, or "0,1,2" for 3-shot
  output_file: null  # Will be auto-named as medqa_[hash].json. All pipeline stages update this single file by default.

# ------------------------------
#  Model Inference Settings
# ------------------------------
model:
  provider: hf
  name: "meta-llama/Llama-3.2-3B-Instruct"

inference:
  temperature: 0.01
  max_new_tokens: 10  # Short answer needed (just A, B, C, D, or E)
  output_file: null  # Will be auto-named as medqa_[hash].json. All pipeline stages update this single file by default.

# ------------------------------
#  Evaluation Settings
# ------------------------------
evaluation:
  postprocessing: process_mcq_custom         # Parse and extract multiple-choice answer from model output.
  labels: A-E                                # Option type: A, B, C, D, E
  output_file: null  # Will be auto-named as medqa_[hash].json. All pipeline stages update this single file by default.
  metrics:
    - accuracy
    - macro_f1
    - weighted_f1
