# ------------------------------
#  Task and Dataset Settings
# ------------------------------
task: slc 
dataset: ddi  # Dataset identifier/name for organizing and querying experiments

data_files:
  test_file: "data/datasets/samples/ddi_test_samples.json"
  train_file:

# ------------------------------
#  Prompt Generation Settings
# ------------------------------
prompt:
  system_prompt: "config/prompts/slc/ddi.txt"
  shot_indices:  # Omit for zero-shot, or "0,1,2" for 3-shot
  output_file: null  # Will be auto-named as ddi_[hash].json. All pipeline stages update this single file by default.

# ------------------------------
#  Model Inference Settings
# ------------------------------
model:
  provider: hf
  name: "meta-llama/Llama-3.2-3B-Instruct"

inference:
  temperature: 0.01
  max_new_tokens: 10
  output_file: null  # Will be auto-named as ddi_[hash].json. All pipeline stages update this single file by default.

# ------------------------------
#  Evaluation Settings
# ------------------------------
evaluation:
  postprocessing: load_normalized_data       # Text normalization: lowercase + strip leading or trailing whitespace
  labels: null                               # No labels needed for SLC tasks (auto-discovered)
  output_file: null  # Will be auto-named as ddi_[hash].json. All pipeline stages update this single file by default.
  metrics:
    - macro_f1
    - weighted_f1
